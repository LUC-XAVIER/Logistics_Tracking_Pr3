spring:
  application:
    name: API_Gateway
  main:
    web-application-type: reactive
  cloud:
    gateway:
      server:
        webflux:
          globalcors:
            add-to-simple-url-handler-mapping: true
            cors-configurations:
              '[/**]':
                allowed-origin-patterns:
                  - "*"
                allowed-methods:
                  - "*"
                allowed-headers:
                  - "*"
                exposed-headers:
                  - "*"
          routes:
            - id: parcel-service-parcels
              uri: lb://ParcelService
              predicates:
                - Path=/api/v1/parcels/**
            - id: parcel-service-agencies
              uri: lb://ParcelService
              predicates:
                - Path=/api/v1/agencies/**,/api/v1/routes/**, /api/parcels/**
            - id: parcel-service-routes
              uri: lb://ParcelService
              predicates:
                - Path=/api/v1/routes/**
            - id: delivery-service
              uri: lb://DeliveryService
              predicates:
                - Path=/api/v1/deliveries/**,/api/trips/**
            - id: payment-service
              uri: lb://PaymentService
              predicates:
                - Path=/api/v1/payments/**
            - id: notification-service
              uri: lb://NotificationService
              predicates:
                - Path=/api/v1/notifications/**
server:
  port: 8765
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
