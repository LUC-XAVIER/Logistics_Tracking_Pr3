spring:
  application:
    name: ParcelService
  datasource:
    url: jdbc:mysql://localhost:3307/logistics_db
    username: root
    password: weber12?
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    database-platform: org.hibernate.dialect.MySQLDialect
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    # Kafka configuration
    kafka:
      bootstrap-servers: localhost:9092  # Kafka broker address

server:
  port: 8082
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

# Logging configuration
logging:
  level:
    com.logistics.parcel: DEBUG  # Debug level for our code
    org.springframework.kafka: INFO  # Info level for Kafka
    org.hibernate.SQL: DEBUG  # Show SQL queries