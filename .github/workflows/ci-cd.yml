name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  AWS_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}

jobs:

  # ══════════════════════════════════════════════════════════════════
  # JOB 1 — TEST
  # Runs first. Build and Deploy won't start if this fails.
  # ══════════════════════════════════════════════════════════════════
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Test service-registry
        run: cd ServiceRegistry && mvn test -B

      - name: Test api-gateway
        run: cd API_Gateway && mvn test -B

      - name: Test parcel-service
        run: cd ParcelService && mvn test -B

      - name: Test delivery-service
        run: cd DeliveryService && mvn test -B

      - name: Test notification-service
        run: cd NotificationService && mvn test -B

      - name: Test payment-service
        run: cd PaymentService && mvn test -B

      - name: Test user-service
        run: cd UserManagementService && mvn test -B

      - name: Upload test reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-reports
          path: services/*/target/surefire-reports/

  # ══════════════════════════════════════════════════════════════════
  # JOB 2 — BUILD & PUSH TO ECR
  # Only runs if test job passes.
  # ══════════════════════════════════════════════════════════════════
  build:
    name: Build & Push to AWS ECR
    runs-on: ubuntu-latest
    needs: test        # ← waits for test to pass before starting

    strategy:
      matrix:
        include:
          - service: ServiceRegistry
            context: ./ServiceRegistry
          - service: API_Gateway
            context: ./API_Gateway
          - service: ParcelService
            context: ./ParcelService
          - service: DeliveryService
            context: ./DeliveryService
          - service: NotificationService
            context: ./NotificationService
          - service: PaymentService
            context: ./PaymentService
          - service: user-service
            context: ./UserManagementService

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Create ECR repository if not exists
        run: |
          aws ecr describe-repositories --repository-names ${{ matrix.service }} \
          || aws ecr create-repository --repository-name ${{ matrix.service }}

      - name: Build and push ${{ matrix.service }}
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          push: true
          tags: |
            ${{ env.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ matrix.service }}:latest
            ${{ env.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ matrix.service }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ══════════════════════════════════════════════════════════════════
  # JOB 3 — DEPLOY TO EC2
  # Only runs if build job passes AND only on main branch.
  # ══════════════════════════════════════════════════════════════════
  deploy:
    name: Deploy to AWS EC2
    runs-on: ubuntu-latest
    needs: build       # ← waits for ALL matrix build jobs to pass
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy via SSH to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |

            # ── 1. Login to ECR ──────────────────────────────────────
            aws ecr get-login-password --region ${{ secrets.AWS_REGION }} | \
              docker login --username AWS --password-stdin \
              ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com

            # ── 2. Go to project directory ───────────────────────────
            cd /opt/logistics

            # ── 3. Pull latest code ──────────────────────────────────
            git pull origin main

            # ── 4. Recreate .env from GitHub Secrets ─────────────────
            cat > .env << EOF
            MYSQL_ROOT_PASSWORD=${{ secrets.MYSQL_ROOT_PASSWORD }}
            JWT_SECRET=${{ secrets.JWT_SECRET }}
            MAIL_USERNAME=${{ secrets.MAIL_USERNAME }}
            MAIL_PASSWORD=${{ secrets.MAIL_PASSWORD }}
            AWS_REGION=${{ secrets.AWS_REGION }}
            AWS_ACCOUNT_ID=${{ secrets.AWS_ACCOUNT_ID }}
            FIREBASE_PROJECT_ID=${{secrets.FIREBASE_PROJECT_ID}}
            EOF

            # ── 5. Pull latest images from ECR ───────────────────────
            docker-compose -f docker-compose.prod.yml pull

            # ── 6. Restart all services ──────────────────────────────
            docker-compose -f docker-compose.prod.yml up -d --remove-orphans

            # ── 7. Clean up old images ───────────────────────────────
            docker image prune -f

            echo "✅ Deployment complete"