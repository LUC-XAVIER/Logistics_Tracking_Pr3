name: CI/CD Pipeline

on:
  push:
    branches: [ main, feature/* ]
  pull_request:
    branches: [ main, feature/* ]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}

jobs:

  # ══════════════════════════════════════════════════════════════════
  # JOB 1 — TEST
  # Runs first. Build and Deploy won't start if this fails.
  # ══════════════════════════════════════════════════════════════════
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Test service-registry
        run: cd ServiceRegistry && mvn test -B

      - name: Test api-gateway
        run: cd API_Gateway && mvn test -B

      - name: Test parcel-service
        run: cd ParcelService && mvn test -B

      - name: Test delivery-service
        run: cd DeliveryService && mvn test -B

      - name: Test notification-service
        run: cd NotificationService && mvn test -B

      - name: Test payment-service
        run: cd PaymentService && mvn test -B

      - name: Test user-service
        run: cd UserManagementService && mvn test -B

      - name: Upload test reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-reports
          path: ./*/target/surefire-reports/

  # ══════════════════════════════════════════════════════════════════
  # JOB 2 — BUILD & PUSH TO ECR
  # Only runs if test job passes.
  # ══════════════════════════════════════════════════════════════════
  build:
    name: Build & Push to AWS ECR
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        include:
          - service: ServiceRegistry
            context: ./ServiceRegistry
          - service: API_Gateway
            context: ./API_Gateway
          - service: ParcelService
            context: ./ParcelService
          - service: DeliveryService
            context: ./DeliveryService
          - service: NotificationService
            context: ./NotificationService
          - service: PaymentService
            context: ./PaymentService
          - service: user-service
            context: ./UserManagementService

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push ${{ matrix.service }}
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/${{ matrix.service }}:latest
            ghcr.io/${{ github.repository_owner }}/${{ matrix.service }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ══════════════════════════════════════════════════════════════════
  # JOB 3 — DEPLOY TO EC2
  # Only runs if build job passes AND only on main branch.
  # ══════════════════════════════════════════════════════════════════
  deploy:
    name: Deploy to AWS EC2
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy via SSH to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |

            # ── 1. Login to GHCR ─────────────────────────────────────
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io \
              -u ${{ github.actor }} --password-stdin
            
            # ── 2. Go to project directory ───────────────────────────
            cd /opt/logistics

            # ── 3. Pull latest code ──────────────────────────────────
            git pull origin main

            # ── 4. Recreate .env from GitHub Secrets ─────────────────
            cat > .env << EOF
            MYSQL_ROOT_PASSWORD=${{ secrets.MYSQL_ROOT_PASSWORD }}
            JWT_SECRET=${{ secrets.JWT_SECRET }}
            MAIL_USERNAME=${{ secrets.MAIL_USERNAME }}
            MAIL_PASSWORD=${{ secrets.MAIL_PASSWORD }}
            FIREBASE_PROJECT_ID=${{secrets.FIREBASE_PROJECT_ID}}
            GITHUB_REPOSITORY_OWNER=${{ github.repository_owner }}
            EOF

            # ── 5. Pull latest images from ECR ───────────────────────
            docker-compose -f docker-compose.prod.yml pull

            # ── 6. Restart all services ──────────────────────────────
            docker-compose -f docker-compose.prod.yml up -d --remove-orphans

            # ── 7. Clean up old images ───────────────────────────────
            docker image prune -f

            echo "✅ Deployment complete"