spring:
  application:
    name: PaymentService
  datasource:
    url: jdbc:mysql://localhost:3306/logistics_db
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    database-platform: org.hibernate.dialect.MySQLDialect
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  kafka:
    bootstrap-servers: localhost:9092

    # Producer configuration
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      acks: all
      retries: 3
      properties:
        enable.idempotence: true
        linger.ms: 10

    # Consumer configuration (UPDATED - No deprecated classes)
    consumer:
      group-id: payment-service-group
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer

      # Use ErrorHandlingDeserializer wrapper
      value-deserializer: org.springframework.kafka.support.serializer.ErrorHandlingDeserializer

      auto-offset-reset: earliest
      enable-auto-commit: false

      properties:
        # Actual deserializer inside error handler
        spring.deserializer.value.delegate.class: org.springframework.kafka.support.serializer.JsonDeserializer

        # Trust all packages (adjust for production)
        spring.json.trusted.packages: "*"

        # Don't require type headers
        spring.json.use.type.headers: false

        # Default to HashMap if type unknown
        spring.json.value.default.type: java.util.HashMap
server:
  port: 8084
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
